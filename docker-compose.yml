services:
  postgres:
    image: postgres:15
    container_name: oulad-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: oulad-mlflow
    env_file:
      - .env
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: ${MLFLOW_DEFAULT_ARTIFACT_ROOT}
      MLFLOW_HOST: ${MLFLOW_HOST}
      MLFLOW_PORT: ${MLFLOW_PORT}
      MLFLOW_ALLOWED_HOSTS: "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: oulad-fastapi
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - mlflow_artifacts:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: oulad-airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL}
      PYTHONPATH: /opt/airflow/project
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      DATABASE_URL: ${DATABASE_URL}
      GIT_PYTHON_REFRESH: quiet
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - ./logs:/opt/airflow/logs
      - mlflow_artifacts:/mlflow
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin123 || true &&
      airflow scheduler &
      exec airflow webserver"
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
